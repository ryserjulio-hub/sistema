# Docker Compose — Macroeconomic AI Platform
# Serviços ativos: portfolio-api (EconomistPortfolioAgent) + n8n.
# backend/frontend completos ainda são placeholders (stack a definir/confirmar
# em ARCHITECTURE.md) — descomentar e ajustar quando estiverem prontos.

version: "3.9"

services:
  # backend:
  #   build: ../backend
  #   ports:
  #     - "8000:8000"

  # frontend:
  #   build: ../frontend
  #   ports:
  #     - "3000:3000"

  portfolio-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.portfolio-api
    container_name: macro-ai-portfolio-api
    ports:
      - "8010:8000"
    restart: unless-stopped
    networks:
      - macro-ai-net

  n8n:
    image: n8nio/n8n:latest
    container_name: macro-ai-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - TZ=America/Sao_Paulo
      # URL que os workflows do n8n devem usar para chamar a API dentro da
      # rede docker (nome do serviço, não localhost):
      - PORTFOLIO_API_BASE_URL=http://portfolio-api:8000
      # URL da própria instância n8n, usada pelo workflow de monitoramento
      # (n8n/workflows/workflow_health_monitor.json) para consultar a API
      # pública do n8n (Settings -> API -> gerar API Key):
      - N8N_BASE_URL=http://localhost:5678
    volumes:
      - n8n_data:/home/node/.n8n
      - ../n8n/workflows:/home/node/.n8n/workflows-import:ro
    depends_on:
      - portfolio-api
    restart: unless-stopped
    networks:
      - macro-ai-net

networks:
  macro-ai-net:
    driver: bridge

volumes:
  n8n_data:
